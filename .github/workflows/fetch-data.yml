name: Oran Verisi Guncelle

on:
  schedule:
    - cron: '0 6 * * 1,4'
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Python kur
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Veriyi cek
        run: python scripts/fetch_odds.py

      - name: Kaydet
        run: |
          git config user.name "HTFT Bot"
          git config user.email "bot@htft.local"
          git add data/
          git diff --cached --quiet || git commit -m "Veri guncellendi: $(date '+%d/%m/%Y')"
          git push
